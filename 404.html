<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Apartmán nad sklípkem</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M10 4h12l-2 10a4 4 0 01-4 4 4 4 0 01-4-4L10 4z' fill='%239e7a2e'/%3E%3Crect x='15' y='18' width='2' height='8' fill='%239e7a2e'/%3E%3Crect x='11' y='26' width='10' height='2' rx='1' fill='%239e7a2e'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5efe6;
            color: #3b2e24;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: clamp(6rem, 15vw, 10rem);
            color: #9e7a2e;
            opacity: 0.15;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        p {
            color: #6b5d52;
            max-width: 440px;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .btn {
            display: inline-block;
            padding: 0.9rem 2.5rem;
            background: linear-gradient(135deg, #9e7a2e 0%, #b8924a 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(158, 122, 46, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(158, 122, 46, 0.4);
        }

        .wine-spill {
            margin-top: 3rem;
            opacity: 0.08;
        }
    </style>
</head>

<body>
    <div class="error-code">404</div>
    <h1>Stránka se vypařila</h1>
    <p>Omlouváme se, ale stránka, kterou hledáte, se bohužel někde zatoulala. Možná je právě ve sklepě na koštu.</p>
    <a href="/" class="btn">Zpět na hlavní stránku</a>

    <!-- Decorative wine glass -->
    <svg class="wine-spill" width="60" height="80" viewBox="0 0 32 32">
        <path d="M10 4h12l-2 10a4 4 0 01-4 4 4 4 0 01-4-4L10 4z" fill="#9e7a2e" />
        <rect x="15" y="18" width="2" height="8" fill="#9e7a2e" />
        <rect x="11" y="26" width="10" height="2" rx="1" fill="#9e7a2e" />
    </svg>
</body>

</html>
