<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Vinařství Hušek</title>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: var(--color-bg);
            color: var(--color-text);
        }

        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(6rem, 15vw, 10rem);
            color: var(--color-accent);
            opacity: 0.2;
            line-height: 1;
        }

        .error-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .error-text {
            color: var(--color-text-dim);
            max-width: 500px;
            margin-bottom: 3rem;
        }
    </style>
</head>

<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Stránka se vypařila</h1>
        <p class="error-text">Omlouváme se, ale stránka, kterou hledáte, se bohužel někde zatoulala. Možná je právě ve
            sklepě na koštu.</p>
        <a href="/" class="btn-primary">Zpět na hlavní stránku</a>
    </div>
</body>

</html>
