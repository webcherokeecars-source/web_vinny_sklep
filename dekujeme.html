<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Děkujeme za zprávu | Apartmán nad sklípkem</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M10 4h12l-2 10a4 4 0 01-4 4 4 4 0 01-4-4L10 4z' fill='%239e7a2e'/%3E%3Crect x='15' y='18' width='2' height='8' fill='%239e7a2e'/%3E%3Crect x='11' y='26' width='10' height='2' rx='1' fill='%239e7a2e'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5efe6;
            color: #3b2e24;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            text-align: center;
            max-width: 560px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(158, 122, 46, 0.15);
            border-radius: 20px;
            padding: 3.5rem 3rem;
            box-shadow: 0 20px 60px rgba(60, 40, 20, 0.08);
            backdrop-filter: blur(8px);
            animation: fadeUp 0.8s ease-out;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #9e7a2e 0%, #c4a44a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(158, 122, 46, 0.25);
        }

        .icon svg {
            width: 36px;
            height: 36px;
            stroke: #fff;
            fill: none;
            stroke-width: 2;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 600;
            margin-bottom: 1rem;
            color: #3b2e24;
        }

        p {
            font-size: 1rem;
            line-height: 1.7;
            color: #6b5d52;
            margin-bottom: 0.5rem;
        }

        .highlight {
            color: #9e7a2e;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.9rem 2.5rem;
            background: linear-gradient(135deg, #9e7a2e 0%, #b8924a 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(158, 122, 46, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(158, 122, 46, 0.4);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
        <h1>Děkujeme za zprávu!</h1>
        <p>Vaši zprávu jsme úspěšně přijali.</p>
        <p>Ozveme se vám <span class="highlight">co nejdříve</span>, obvykle do 24 hodin.</p>
        <a href="index.html" class="btn">Zpět na hlavní stránku</a>
    </div>
</body>

</html>
